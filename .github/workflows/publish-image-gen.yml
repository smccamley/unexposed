name: Publish Image Gen

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish Mirrored Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Read package metadata
        id: package
        run: |
          set -euo pipefail
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify package
        run: npm run verify

      - name: Check published version
        id: published
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is not published yet."
          fi

      - name: Publish package
        if: ${{ steps.published.outputs.publish == 'true' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          NODE_AUTH_TOKEN="${NPM_TOKEN:-${NPM_AUTH_TOKEN:-}}"
          if test -z "$NODE_AUTH_TOKEN"; then
            echo "Missing NPM_TOKEN or NPM_AUTH_TOKEN repository secret." >&2
            exit 1
          fi
          export NODE_AUTH_TOKEN
          npm publish --access public --provenance

      - name: Tag release
        if: ${{ steps.published.outputs.publish == 'true' }}
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          tag="image-gen-v${PACKAGE_VERSION}"
          git tag "$tag"
          git push origin "$tag"
